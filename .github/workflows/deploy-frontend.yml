name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: resume-tailor-frontend
  # Public URL — not a secret (visible in browser network tab)
  BACKEND_URL: http://13.126.202.171

jobs:
  test:
    name: Lint + Test + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-directory: frontend
      - run: npm ci
      - run: npm run lint
      - run: npx vitest run
      - run: npm run build

  deploy:
    name: Build → ECR → EC2
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      # NEXT_PUBLIC_API_URL baked in at build time (see doc 06 for why)
      - name: Build Docker image
        id: build
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ env.BACKEND_URL }} \
            -t $IMAGE frontend/
          docker tag $IMAGE ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Push to ECR
        run: |
          docker push ${{ steps.build.outputs.image }}
          docker push ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

            # Pull latest secrets and write env file
            aws secretsmanager get-secret-value \
              --secret-id resume-tailor/frontend \
              --region ap-south-1 \
              --query SecretString \
              --output text | python3 -c "
            import json, sys
            for k, v in json.load(sys.stdin).items():
                print(f'{k}={v}')
            " > /home/ec2-user/apps/resume-tailor-frontend.env


            cd /home/ec2-user/apps
            docker compose pull resume-tailor-frontend
            docker compose up -d resume-tailor-frontend
            docker image prune -f
            echo "Frontend deployed: ${{ github.sha }}"